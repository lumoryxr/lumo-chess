name: Build Android APK

on:
  push:
    branches: ['**']
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to publish the APK to a GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumochess-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # On main, publish the APK to a rolling GitHub Release so it has a stable,
      # public download link that never expires (unlike the artifact above).
      - name: Publish APK to rolling GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk lumochess-debug.apk
          gh release create debug-latest \
            --prerelease \
            --title "象棋残局 · 最新调试版" \
            --notes "每次合并到 main 自动更新的调试版 APK。安装：下载后传到安卓手机，允许未知来源后安装。（调试签名，仅供测试，非 Google Play 正式包）" \
            2>/dev/null || true
          gh release upload debug-latest lumochess-debug.apk --clobber
